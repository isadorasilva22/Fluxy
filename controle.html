<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle - Fluxy</title>
    <link rel="stylesheet" href="css/controle.css">
    <link rel='icon' type="image/icon" href="view/controle.png">
</head>
<body>

<div class="container">
    <header class="topo">
    <div class="titulo">
        <h1>Controle de Despesas</h1>
        <p>Organize suas finanças de forma leve e simples</p>
    </div>

    <a href="registros.html" class="btn-registros">
        📋 Ver Despesas
    </a>
</header>

    <section class="card resumo">
        <h2>Resumo Orçamentário</h2>
        <div class="valores">
            <div>
                <span>Receitas</span>
                <strong id="total-receitas">R$ 0,00</strong>
            </div>
            <div>
                <span>Despesas</span>
                <strong id="total-despesas">R$ 0,00</strong>
            </div>
            <div>
                <span>Saldo</span>
                <strong id="saldo">R$ 0,00</strong>
            </div>
        </div>
    </section>

  <div class="form-wrapper">

    <!-- FORMULÁRIO DE RECEITA -->
    <section class="card adicionar">
        <h2>Adicionar Receita</h2>
        <form id="form-receita">
            <input type="text" id="descricao-receita" placeholder="Descrição" required>
            <input type="number" id="valor-receita" placeholder="Valor" required>
            <input type="date" id="data-receita" required>
            <button type="submit">Salvar Receita</button>
        </form>
    </section>

    <!-- FORMULÁRIO DE DESPESA -->
    <section class="card adicionar">
        <h2>Adicionar Despesa</h2>
        <form id="form-despesa">
            <input type="text" id="descricao-despesa" placeholder="Descrição" required>
            <input type="number" id="valor-despesa" placeholder="Valor" required>
            <input type="date" id="data-despesa" required>
            <button type="submit">Salvar Despesa</button>
        </form>
    </section>

</div>
</div>

<script src="js/controle.js"></script>
</body>
</html>
