<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Fluxy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel='icon' type="image/icon" href="{{ url_for('static', filename='src/login.png') }}">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>

            <button type="submit">Entrar</button>
        </form>

        <p id="erro" class="erro"></p>

        <p class="cadastro">
            Não tem conta? <a href="/cadastro">Criar conta</a>
        </p>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const res = await fetch("/login", {
        method: "POST",
        credentials: "include",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (res.ok) {
        window.location.href = "/controle";
    } else {
        document.getElementById("erro").innerText = data.erro;
    }
});
</script>

</body>
</html>
