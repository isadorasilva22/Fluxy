<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Despesas - Fluxy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registros.css') }}">
    <link rel='icon' type="image/icon" href="{{ url_for('static', filename='src/despesas.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <header class="topo">
        <div class="titulo">
            <h1>📋 Seus Registros</h1>
            <p>Visualize todas as receitas e despesas cadastradas</p>
        </div>

        <a href="{{ url_for('controle') }}" class="btn-voltar">
            Voltar
        </a>
    </header>

    <!-- FILTRO GLOBAL -->
<div class="card">
    <div class="filtro">
        <label for="filtro-mes">Filtrar por mês:</label>
        <input type="month" id="filtro-mes">
        <button id="btn-limpar" class="btn-limpar">Limpar</button>
    </div>
</div>

    <!-- RECEITAS -->
    <section class="card">
        <h2>Receitas</h2>

        <table class="tabela tabela-animada">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-receitas"></tbody>
        </table>
    </section>

    <!-- DESPESAS -->
    <section class="card">
        <h2>Despesas</h2>

        <table class="tabela tabela-animada">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Tipo</th>
                    <th>Forma de Pagamento</th>
                    <th>Valor</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-despesas"></tbody>
        </table>
    </section>

</div>

<div id="modal-editar" class="modal">
  <div class="modal-conteudo">
    <h3>Editar Registro</h3>

    <label>Descrição</label>
    <input type="text" id="edit-descricao">

    <label>Tipo</label>
    <select id="edit-tipo-despesa"></select>
    
    <label>Valor</label>
    <input type="number" id="edit-valor">

    <label>Forma de pagamento</label>
    <select id="edit-forma-pagamento"></select>

    <div id="edit-grupo-parcelas" style="display:none;">
        <label>Parcelas</label>
        <select id="edit-parcelas">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
            <option value="7">7x</option>
            <option value="8">8x</option>
            <option value="9">9x</option>
            <option value="10">10x</option>
            <option value="11">11x</option>
            <option value="12">12x</option>
        </select>
    </div>

    <label>Data</label>
    <input type="date" id="edit-data">

    <div class="modal-botoes">
      <button id="btn-salvar">Salvar</button>
      <button id="btn-cancelar">Cancelar</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/registros.js') }}"></script>
</body>
</html>
