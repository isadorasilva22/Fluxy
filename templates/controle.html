<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Controle - Fluxy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/controle.css') }}">
    <link rel='icon' type="image/icon" href="{{ url_for('static', filename='src/controle.png') }}">
</head>
<body>

<div class="container">
    <header class="topo">
    <div class="titulo">
        <h1>Controle de Despesas</h1>
        <p>Organize suas finanças de forma leve e simples</p>
    </div>
    <div class="botoes">
        <a href="{{ url_for('index') }}" class="btn-registros">
        🏠 Home
        </a>

        <a href="{{ url_for('registros') }}" class="btn-registros">
        📋 Ver Despesas
        </a>
    </div>
</header>

<!-- ================= ABAS ================= -->
<div class="abas">
    <button class="aba-btn ativa" onclick="trocarAba('resumo', this)">
        📊 Resumo Orçamentário
    </button>
    <button class="aba-btn" onclick="trocarAba('limites', this)">
        💳 Limites e Despesas
    </button>
</div>

<!-- ================= ABA 1 ================= -->
<div id="aba-resumo" class="aba-conteudo ativa">

    <section class="card resumo">
        <h2>Resumo Orçamentário</h2>
        <div class="valores">
            <div>
                <span>Receitas</span>
                <strong id="total-receitas">R$ 0,00</strong>
            </div>
            <div>
                <span>Despesas</span>
                <strong id="total-despesas">R$ 0,00</strong>
            </div>
            <div>
                <span>Saldo</span>
                <strong id="saldo">R$ 0,00</strong>
            </div>
        </div>
    </section>

  <div class="form-wrapper">

    <!-- FORMULÁRIO DE RECEITA -->
    <section class="card adicionar">
        <h2>Adicionar Receita</h2>
        <form id="form-receita">
            <input type="text" id="descricao-receita" placeholder="Descrição" required>
            <input type="text" id="valor-receita" placeholder="Valor" required>
            <input type="date" id="data-receita" required>
            <button type="submit">Salvar Receita</button>
        </form>
    </section>

    <!-- FORMULÁRIO DE DESPESA -->
    <section class="card adicionar">
        <h2>Adicionar Despesa</h2>
        <form id="form-despesa">
            <input type="text" id="descricao-despesa" placeholder="Descrição" required>
            <select id="tipo-despesa" required></select>
            <input type="text" id="valor-despesa" placeholder="Valor" required>
            <select id="forma-pagamento" required></select>
            <input type="date" id="data-despesa" required>
            <button type="submit">Salvar Despesa</button>
        </form>
    </section>

</div>
</div>

<!-- ================= ABA 2 ================= -->
<div id="aba-limites" class="aba-conteudo">

    <section class="card">
        <h2>Cadastro de Tipos de Despesa</h2>
        <form id="form-tipo">
            <input type="text" id="novo-tipo" placeholder="Ex: Alimentação, Transporte..." required>
            <button type="submit">Salvar Tipo</button>
        </form>
    </section>

    <section class="card">
        <h2>Formas de Pagamento</h2>
        <form id="form-forma">
            <input type="text" id="nova-forma" placeholder="Ex: Crédito, Pix..." required>
            <button type="submit">Salvar</button>
        </form>
    </section>

    <section class="card">
        <h2>Definir Limite</h2>
        <form id="form-limite">
            <input type="text" placeholder="Ex: Cartão Nubank" required>
            <input type="text" placeholder="Limite" required>
            <button type="submit">Salvar Limite</button>
        </form>
    </section>

</div>

<script src="{{ url_for('static', filename='js/controle.js') }}"></script>
</body>
</html>
